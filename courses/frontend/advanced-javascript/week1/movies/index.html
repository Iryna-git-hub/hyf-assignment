<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies sorting</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Movies sorting</h1>

    <div class="container">
    <div class="filters">
        <button id="shortBtn">Short titles</button>
        <button id="longBtn">Long titles</button>
        <button id="movies80sBtn">Movies from 80s</button>
        <button id="ratingBtn">Rating > 6</button>
        <div class="checkboxFilter">

        <label>
            <input type="checkbox" value="surfer"> Surfer
        </label>

        <label>
            <input type="checkbox" value="alien"> Alien
        </label>

        <label>
            <input type="checkbox" value="benjamin"> Benjamin
        </label>

        <button id="keywordBtn">Filter keywords</button>

        </div>

</div>

<div id="stats"></div>

<div id="moviesList" class="movies"></div>

<button id="showMore" class="show-more-btn">Show more movies</button>

<script type="module" src="script.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
